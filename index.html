<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Service - 3X-UI</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        .btn { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 5px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 VPN Сервис</h1>
        <p>Создайте VPN ключ на 3 дня</p>
        
        <button class="btn" onclick="createVPN()">Создать ключ</button>
        
        <div id="result" class="result"></div>
        
        <div id="stats" style="margin-top: 30px; padding: 15px; background: #f8f9fa; border-radius: 5px;">
            <h3>📊 Статистика:</h3>
            <p>Пользователей: <span id="userCount">0</span></p>
            <p>Активных: <span id="activeCount">0</span></p>
        </div>
    </div>

    <script>
        // КОНФИГ - ИЗМЕНИ ЭТИ НАСТРОЙКИ!
        const XUI_API_URL = 'http://82.24.110.81:54321'; // Порту 3X-UI
        const XUI_USERNAME = 'admin'; // Логин 3X-UI
        const XUI_PASSWORD = 'admin'; // Пароль 3X-UI
        const INBOUND_ID = 1; // ID инбаунда в 3X-UI
        
        // Создаёт VPN пользователя
        async function createVPN() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '🔄 Создаю ключ...';
            resultDiv.style.display = 'block';
            
            try {
                // 1. Логинимся в 3X-UI (получаем токен)
                const loginRes = await fetch(`${XUI_API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: XUI_USERNAME,
                        password: XUI_PASSWORD
                    })
                });
                
                if (!loginRes.ok) {
                    throw new Error('Ошибка авторизации 3X-UI');
                }
                
                const loginData = await loginRes.json();
                const token = loginData.token || loginData.access_token;
                
                // 2. Создаём пользователя
                const username = `user_${Date.now()}`;
                const expiryTime = Date.now() + (3 * 24 * 60 * 60 * 1000); // 3 дня
                
                const createRes = await fetch(`${XUI_API_URL}/api/inbounds/addClient`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        inboundId: INBOUND_ID,
                        email: username,
                        enable: true,
                        expiryTime: expiryTime,
                        totalGB: 0, // безлимит
                        flow: "xtls-rprx-vision",
                        limitIp: 0
                    })
                });
                
                const userData = await createRes.json();
                
                if (userData.success) {
                    // 3. Формируем VLESS ссылку
                    const vlessLink = generateVlessLink(userData);
                    
                    resultDiv.innerHTML = `
                        <h3>✅ Ключ создан!</h3>
                        <p><strong>Пользователь:</strong> ${username}</p>
                        <p><strong>Ссылка:</strong></p>
                        <textarea readonly style="width:100%; height:100px; margin:10px 0;">${vlessLink}</textarea>
                        <br>
                        <button onclick="copyToClipboard('${vlessLink}')">📋 Копировать</button>
                    `;
                    
                    updateStats();
                } else {
                    throw new Error(userData.msg || 'Ошибка создания');
                }
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <h3>❌ Ошибка</h3>
                    <p>${error.message}</p>
                    <p>Используй запасной метод:</p>
                    <button onclick="createFallback()">Создать без 3X-UI</button>
                `;
            }
        }
        
        // Запасной метод (просто генерирует ссылку без API)
        function createFallback() {
            const username = `user_${Date.now()}`;
            const uuid = generateUUID();
            
            // Параметры твоего сервера
            const server = "82.24.110.81";
            const pbk = "fbh5z3lWFuN5Xe_1QP7Kbi7E6lL3a3h7JUAZi6uaCnc";
            const sni = "www.microsoft.com";
            const sid = "2be6";
            
            const vlessLink = `vless://${uuid}@${server}:443?security=reality&encryption=none&pbk=${pbk}&headerType=none&fp=chrome&type=tcp&flow=xtls-rprx-vision&sni=${sni}&sid=${sid}#VPN_${username}`;
            
            document.getElementById('result').innerHTML = `
                <h3>⚠️ Ключ создан (без 3X-UI)</h3>
                <p>Добавь его вручную в панель 3X-UI</p>
                <textarea readonly style="width:100%; height:100px; margin:10px 0;">${vlessLink}</textarea>
                <p><strong>UUID для копирования:</strong> ${uuid}</p>
                <button onclick="copyToClipboard('${vlessLink}')">📋 Копировать ссылку</button>
            `;
        }
        
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        
        function generateVlessLink(userData) {
            // Формируем ссылку из данных 3X-UI
            const server = "82.24.110.81";
            const pbk = "fbh5z3lWFuN5Xe_1QP7Kbi7E6lL3a3h7JUAZi6uaCnc";
            const sni = "www.microsoft.com";
            const sid = "2be6";
            const uuid = userData.id || generateUUID();
            const username = userData.email || `user_${Date.now()}`;
            
            return `vless://${uuid}@${server}:443?security=reality&encryption=none&pbk=${pbk}&headerType=none&fp=chrome&type=tcp&flow=xtls-rprx-vision&sni=${sni}&sid=${sid}#VPN_${username}`;
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert('✅ Скопировано!');
        }
        
        async function updateStats() {
            // Получаем статистику из 3X-UI
            try {
                const loginRes = await fetch(`${XUI_API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: XUI_USERNAME,
                        password: XUI_PASSWORD
                    })
                });
                
                if (loginRes.ok) {
                    const loginData = await loginRes.json();
                    const token = loginData.token;
                    
                    const statsRes = await fetch(`${XUI_API_URL}/api/inbounds/list`, {
                        headers: {'Authorization': `Bearer ${token}`}
                    });
                    
                    const data = await statsRes.json();
                    
                    if (data.success) {
                        let totalUsers = 0;
                        let activeUsers = 0;
                        
                        data.obj.forEach(inbound => {
                            inbound.clientStats.forEach(client => {
                                totalUsers++;
                                if (client.enable && client.expiryTime > Date.now()) {
                                    activeUsers++;
                                }
                            });
                        });
                        
                        document.getElementById('userCount').textContent = totalUsers;
                        document.getElementById('activeCount').textContent = activeUsers;
                    }
                }
            } catch (error) {
                console.log('Не могу обновить статистику:', error);
            }
        }
        
        // Обновляем статистику при загрузке
        updateStats();
    </script>
</body>
</html>
