<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberShield VPN - REAL система</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .logo i { color: #4cc9f0; }
        .user-info {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }
        .user-id { 
            font-family: monospace; 
            font-size: 14px;
            opacity: 0.9;
        }
        .status-box {
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            background: #d4edda;
            color: #155724;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .key-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin: 20px;
            display: none;
        }
        .key-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .key-label { color: #666; }
        .key-value { 
            font-family: monospace; 
            font-weight: 500;
            color: #333;
        }
        .buttons {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary {
            background: linear-gradient(135deg, #4361ee, #7209b7);
            color: white;
        }
        .btn-success {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: white;
        }
        .btn-secondary {
            background: #f0f2f5;
            color: #333;
        }
        .link-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin: 20px;
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }
        .copy-btn {
            background: #4361ee;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: calc(100% - 40px);
            margin: 0 20px 20px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #1a1a2e;
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: transform 0.3s;
        }
        .notification.show {
            transform: translateX(-50%) translateY(0);
        }
        .loader {
            text-align: center;
            padding: 20px;
            display: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4361ee;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ШАПКА -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
                CyberShield VPN
            </div>
            <div class="user-info">
                <div class="user-name" id="userName">Получите VPN на 3 дня</div>
                <div class="user-id" id="userId">ID: --</div>
            </div>
        </div>
        
        <!-- СТАТУС -->
        <div class="status-box">
            <div class="status-badge" id="statusBadge">ГОТОВО</div>
            <div class="status-text" id="statusText">Нажмите кнопку для получения ключа</div>
            <div class="status-date" id="statusDate">Работает 3 дня бесплатно</div>
        </div>
        
        <!-- ИНФОРМАЦИЯ О КЛЮЧЕ -->
        <div class="key-info" id="keyInfo">
            <div class="key-row">
                <span class="key-label">UUID:</span>
                <span class="key-value" id="keyUuid">--</span>
            </div>
            <div class="key-row">
                <span class="key-label">Сервер:</span>
                <span class="key-value">82.24.110.81:443</span>
            </div>
            <div class="key-row">
                <span class="key-label">Действует до:</span>
                <span class="key-value" id="keyExpiry">--</span>
            </div>
        </div>
        
        <!-- ССЫЛКА -->
        <div class="link-box" id="linkBox">
            <div id="vpnLink">Здесь будет ваша ссылка</div>
        </div>
        
        <!-- ЗАГРУЗЧИК -->
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <div>Генерирую ваш уникальный ключ...</div>
        </div>
        
        <!-- КНОПКИ -->
        <div class="buttons">
            <button class="btn btn-success" onclick="generateRealKey()">
                <i class="fas fa-key"></i>
                Получить реальный ключ
            </button>
            <button class="btn btn-primary" onclick="setupVPN()" id="setupBtn" disabled>
                <i class="fas fa-bolt"></i>
                Настроить в Happ
            </button>
            <button class="btn btn-secondary" onclick="downloadHapp()">
                <i class="fab fa-google-play"></i>
                Скачать Happ
            </button>
        </div>
        
        <!-- КОПИРОВАТЬ -->
        <button class="copy-btn" onclick="copyLink()" id="copyBtn">
            <i class="fas fa-copy"></i>
            Скопировать ссылку
        </button>
    </div>
    
    <!-- УВЕДОМЛЕНИЯ -->
    <div class="notification" id="notification">Уведомление</div>
    
    <!-- ИКОНКИ FONTAWESOME -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <script>
        // ==================== РЕАЛЬНАЯ КОНФИГУРАЦИЯ ====================
        const REAL_CONFIG = {
            server: "82.24.110.81",
            port: 443,
            publicKey: "fbh5z3lWFuN5Xe_1QP7Kbi7E6lL3a3h7JUAZi6uaCnc", // Твой настоящий ключ
            shortId: "2be6",
            serverName: "www.microsoft.com",
            flow: "xtls-rprx-vision"
        };
        
        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        let currentUser = {
            id: null,
            uuid: null,
            vpnLink: null,
            expires: null,
            created: null
        };
        
        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        document.addEventListener('DOMContentLoaded', function() {
            console.log("🚀 REAL VPN System loaded");
            generateUserId();
            checkExistingKey();
        });
        
        // ==================== ГЕНЕРАЦИЯ ID ПОЛЬЗОВАТЕЛЯ ====================
        function generateUserId() {
            const urlParams = new URLSearchParams(window.location.search);
            let userId = urlParams.get('id') || 
                        urlParams.get('user_id') || 
                        urlParams.get('tg_id');
            
            if (!userId) {
                // Генерируем уникальный ID
                userId = 'user_' + Date.now() + '_' + 
                        Math.random().toString(36).substr(2, 9);
            }
            
            currentUser.id = userId;
            document.getElementById('userName').textContent = `Пользователь ${userId.substr(0, 8)}`;
            document.getElementById('userId').textContent = `ID: ${userId}`;
            
            console.log("👤 User ID:", userId);
            return userId;
        }
        
        // ==================== ГЕНЕРАЦИЯ НАСТОЯЩЕГО UUID ====================
        function generateRealUUID() {
            // Реальная генерация UUID v4
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = crypto.getRandomValues(new Uint8Array(1))[0] % 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        
        // ==================== ГЕНЕРАЦИЯ РЕАЛЬНОГО КЛЮЧА ====================
        async function generateRealKey() {
            console.log("🔑 Генерация РЕАЛЬНОГО ключа...");
            
            // Показываем загрузку
            showLoader(true);
            document.getElementById('setupBtn').disabled = true;
            
            try {
                // 1. Генерируем новый UUID
                const newUuid = generateRealUUID();
                console.log("✅ UUID сгенерирован:", newUuid);
                
                // 2. Устанавливаем срок +3 дня
                const expiryDate = new Date();
                expiryDate.setDate(expiryDate.getDate() + 3);
                
                // 3. Формируем РЕАЛЬНУЮ REALITY ссылку
                const vlessLink = 
                    `vless://${newUuid}@${REAL_CONFIG.server}:${REAL_CONFIG.port}?` +
                    `type=tcp&` +
                    `security=reality&` +
                    `pbk=${REAL_CONFIG.publicKey}&` +
                    `fp=chrome&` +
                    `sni=${REAL_CONFIG.serverName}&` +
                    `sid=${REAL_CONFIG.shortId}&` +
                    `flow=${REAL_CONFIG.flow}&` +
                    `#CyberShieldVPN-3days`;
                
                console.log("🔗 Ссылка сгенерирована:", vlessLink);
                
                // 4. Сохраняем в localStorage
                saveKeyToStorage(newUuid, vlessLink, expiryDate);
                
                // 5. Обновляем интерфейс
                updateKeyInfo(newUuid, vlessLink, expiryDate);
                
                // 6. Показываем уведомление
                showNotification('✅ РЕАЛЬНЫЙ ключ создан! Действует 3 дня', 'success');
                
                // 7. Активируем кнопку настройки
                document.getElementById('setupBtn').disabled = false;
                
                // 8. Сохраняем в IndexedDB для надежности
                await saveToIndexedDB(newUuid, vlessLink, expiryDate);
                
            } catch (error) {
                console.error("❌ Ошибка генерации:", error);
                showNotification('❌ Ошибка генерации ключа', 'error');
            } finally {
                showLoader(false);
            }
        }
        
        // ==================== СОХРАНЕНИЕ В LOCALSTORAGE ====================
        function saveKeyToStorage(uuid, link, expiry) {
            const keyData = {
                uuid: uuid,
                vpnLink: link,
                expires: expiry.getTime(),
                created: Date.now(),
                userId: currentUser.id
            };
            
            // Сохраняем в localStorage
            localStorage.setItem('vpn_key_data', JSON.stringify(keyData));
            console.log("💾 Ключ сохранен в localStorage");
            
            // Сохраняем в sessionStorage для надежности
            sessionStorage.setItem('current_vpn_key', link);
        }
        
        // ==================== СОХРАНЕНИЕ В INDEXEDDB ====================
        async function saveToIndexedDB(uuid, link, expiry) {
            return new Promise((resolve, reject) => {
                try {
                    const request = indexedDB.open('VPNKeysDB', 1);
                    
                    request.onupgradeneeded = function(e) {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('keys')) {
                            const store = db.createObjectStore('keys', { keyPath: 'uuid' });
                            store.createIndex('userId', 'userId', { unique: false });
                            store.createIndex('expires', 'expires', { unique: false });
                        }
                    };
                    
                    request.onsuccess = function(e) {
                        const db = e.target.result;
                        const transaction = db.transaction(['keys'], 'readwrite');
                        const store = transaction.objectStore('keys');
                        
                        const keyData = {
                            uuid: uuid,
                            vpnLink: link,
                            expires: expiry.getTime(),
                            created: Date.now(),
                            userId: currentUser.id
                        };
                        
                        const addRequest = store.add(keyData);
                        
                        addRequest.onsuccess = function() {
                            console.log("💾 Ключ сохранен в IndexedDB");
                            resolve(true);
                        };
                        
                        addRequest.onerror = function(error) {
                            console.error("❌ Ошибка IndexedDB:", error);
                            resolve(false);
                        };
                    };
                    
                    request.onerror = function(error) {
                        console.error("❌ Ошибка открытия IndexedDB:", error);
                        resolve(false);
                    };
                } catch (error) {
                    console.error("❌ IndexedDB не доступен:", error);
                    resolve(false);
                }
            });
        }
        
        // ==================== ПРОВЕРКА СУЩЕСТВУЮЩЕГО КЛЮЧА ====================
        function checkExistingKey() {
            // Проверяем localStorage
            const savedData = localStorage.getItem('vpn_key_data');
            
            if (savedData) {
                try {
                    const data = JSON.parse(savedData);
                    const now = Date.now();
                    
                    // Проверяем срок действия
                    if (data.expires > now) {
                        // Ключ еще действует
                        currentUser.uuid = data.uuid;
                        currentUser.vpnLink = data.vpnLink;
                        currentUser.expires = new Date(data.expires);
                        currentUser.created = new Date(data.created);
                        
                        console.log("📂 Загружен существующий ключ:", data.uuid);
                        updateKeyInfo(data.uuid, data.vpnLink, new Date(data.expires));
                        document.getElementById('setupBtn').disabled = false;
                        
                        showNotification('✅ Загружен ваш действующий ключ', 'info');
                        return true;
                    } else {
                        // Ключ истек
                        console.log("📂 Ключ истек, удаляю...");
                        localStorage.removeItem('vpn_key_data');
                        sessionStorage.removeItem('current_vpn_key');
                        showNotification('⚠️ Ваш ключ истек, получите новый', 'warning');
                    }
                } catch (error) {
                    console.error("❌ Ошибка загрузки ключа:", error);
                }
            }
            
            return false;
        }
        
        // ==================== ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ====================
        function updateKeyInfo(uuid, link, expiryDate) {
            // Показываем информацию о ключе
            document.getElementById('keyInfo').style.display = 'block';
            document.getElementById('keyUuid').textContent = uuid.substring(0, 12) + '...';
            document.getElementById('keyExpiry').textContent = 
                expiryDate.toLocaleDateString('ru-RU') + ' ' + 
                expiryDate.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            
            // Показываем ссылку
            document.getElementById('linkBox').style.display = 'block';
            document.getElementById('vpnLink').textContent = link;
            
            // Обновляем статус
            document.getElementById('statusBadge').textContent = 'АКТИВЕН';
            document.getElementById('statusBadge').style.background = '#d4edda';
            document.getElementById('statusBadge').style.color = '#155724';
            document.getElementById('statusText').textContent = 'VPN ключ активен';
            document.getElementById('statusDate').textContent = 
                `Действует до: ${expiryDate.toLocaleDateString('ru-RU')}`;
            
            // Сохраняем в объекте пользователя
            currentUser.uuid = uuid;
            currentUser.vpnLink = link;
            currentUser.expires = expiryDate;
        }
        
        // ==================== НАСТРОЙКА VPN В HAPP ====================
        function setupVPN() {
            if (!currentUser.vpnLink) {
                showNotification('❌ Сначала получите ключ!', 'error');
                generateRealKey();
                return;
            }
            
            console.log("🚀 Настройка VPN в Happ...");
            
            // 1. Пробуем deep link для Happ
            const happDeepLink = `intent://${encodeURIComponent(currentUser.vpnLink)}` +
                                `#Intent;package=com.happproxy;scheme=vless;end;`;
            
            // 2. Пробуем второй формат
            const happLink2 = `happ://import/config/${btoa(currentUser.vpnLink)}`;
            
            console.log("📱 Пробую deep link:", happDeepLink);
            
            // Сначала пытаемся открыть intent
            window.location.href = happDeepLink;
            
            // Если не открылось за 1 секунду, пробуем второй вариант
            setTimeout(() => {
                console.log("📱 Пробую второй вариант:", happLink2);
                window.location.href = happLink2;
                
                // Если и это не сработало, показываем инструкцию
                setTimeout(() => {
                    showNotification('📱 Скопируйте ссылку и вставьте в Happ вручную', 'info');
                    document.getElementById('linkBox').style.display = 'block';
                }, 1000);
            }, 1000);
        }
        
        // ==================== КОПИРОВАНИЕ ССЫЛКИ ====================
        async function copyLink() {
            if (!currentUser.vpnLink) {
                showNotification('❌ Нет ссылки для копирования', 'error');
                return;
            }
            
            try {
                await navigator.clipboard.writeText(currentUser.vpnLink);
                
                showNotification('✅ Ссылка скопирована!', 'success');
                
                // Визуальный фидбэк
                const btn = document.getElementById('copyBtn');
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> СКОПИРОВАНО!';
                btn.style.background = '#28a745';
                
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.style.background = '#4361ee';
                }, 2000);
                
            } catch (error) {
                // Fallback для старых браузеров
                const textArea = document.createElement('textarea');
                textArea.value = currentUser.vpnLink;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showNotification('✅ Ссылка скопирована!', 'success');
            }
        }
        
        // ==================== СКАЧАТЬ HAPP ====================
        function downloadHapp() {
            const playStoreLink = 'https://play.google.com/store/apps/details?id=com.happproxy';
            window.open(playStoreLink, '_blank');
            showNotification('📱 Открываю Google Play...', 'info');
        }
        
        // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'block' : 'none';
        }
        
        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            
            const colors = {
                success: '#28a745',
                error: '#dc3545',
                info: '#17a2b8',
                warning: '#ffc107'
            };
            
            notification.style.background = colors[type] || colors.info;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
        
        // ==================== ДЛЯ ОТЛАДКИ ====================
        window.debugInfo = function() {
            console.log("=== DEBUG INFO ===");
            console.log("Текущий пользователь:", currentUser);
            console.log("localStorage:", localStorage.getItem('vpn_key_data'));
            console.log("sessionStorage:", sessionStorage.getItem('current_vpn_key'));
            console.log("Конфигурация:", REAL_CONFIG);
        };
        
        window.clearAll = function() {
            localStorage.clear();
            sessionStorage.clear();
            
            if (indexedDB) {
                indexedDB.deleteDatabase('VPNKeysDB');
            }
            
            currentUser = { id: currentUser.id };
            
            document.getElementById('keyInfo').style.display = 'none';
            document.getElementById('linkBox').style.display = 'none';
            document.getElementById('setupBtn').disabled = true;
            document.getElementById('statusBadge').textContent = 'ГОТОВО';
            document.getElementById('statusBadge').style.background = '#d4edda';
            document.getElementById('statusText').textContent = 'Нажмите кнопку для получения ключа';
            document.getElementById('statusDate').textContent = 'Работает 3 дня бесплатно';
            
            showNotification('Все данные очищены', 'info');
        };
        
        // ==================== АВТОМАТИЧЕСКАЯ ПРОВЕРКА КЛЮЧА ====================
        setInterval(() => {
            if (currentUser.expires && new Date() > currentUser.expires) {
                showNotification('⚠️ Ваш ключ истек, получите новый', 'warning');
                document.getElementById('statusBadge').textContent = 'ИСТЕК';
                document.getElementById('statusBadge').style.background = '#f8d7da';
                document.getElementById('statusBadge').style.color = '#721c24';
                document.getElementById('statusText').textContent = 'Ключ истек';
                document.getElementById('setupBtn').disabled = true;
            }
        }, 60000); // Проверка каждую минуту
    </script>
</body>
</html>
